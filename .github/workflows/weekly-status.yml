name: Weekly status (Friday summary appended to STATE.md)

on:
  schedule:
    # Fridays 16:00 UTC ≈ 17:00 UK BST.
    - cron: "0 16 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute and append status
        run: |
          python scripts/weekly_status.py | tee status-output.json

      - name: Commit + push (with rebase retry against concurrent pushes)
        run: |
          git config user.name "Crew OS Bot"
          git config user.email "bot@crewos.co.uk"
          git add STATE.md
          if git diff --cached --quiet; then
            echo "No changes to STATE.md (unlikely)."
            exit 0
          fi
          git commit -m "weekly status: $(date -u +%FT%TZ)"
          for i in 1 2 3 4 5; do
            if git push 2>&1; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push rejected on attempt $i — fetching and rebasing"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep $((i * 3))
          done
          echo "Push failed after 5 attempts" >&2
          exit 1
