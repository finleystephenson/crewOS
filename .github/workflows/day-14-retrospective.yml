name: Day 14 retrospective (writes the May 29 retro block)

on:
  schedule:
    # May 29 at 16:30 UTC ≈ 17:30 UK BST. Deliberately 30 min after weekly-status
    # (Friday 16:00 UTC) so that on the years when May 29 is a Friday — 2026
    # being one — the two workflows don't collide on STATE.md.
    - cron: "30 16 29 5 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compose retrospective + write to STATE.md
        run: |
          python scripts/day_14_retrospective.py | tee retro-output.json

      - name: Commit + push (with rebase retry against concurrent pushes)
        run: |
          git config user.name "Crew OS Bot"
          git config user.email "bot@crewos.co.uk"
          git add STATE.md
          if git diff --cached --quiet; then
            echo "STATE.md unchanged (idempotent re-run)."
            exit 0
          fi
          git commit -m "day-14 retrospective: $(date -u +%FT%TZ)"
          for i in 1 2 3 4 5; do
            if git push 2>&1; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push rejected on attempt $i — fetching and rebasing"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep $((i * 3))
          done
          echo "Push failed after 5 attempts" >&2
          exit 1
