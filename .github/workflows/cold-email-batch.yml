name: Cold email batch (daily, conservative)

on:
  schedule:
    # Weekdays 10:00 UTC (~11:00 UK BST). Skip weekends.
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      daily_cap:
        description: "Override daily send cap"
        required: false
        default: "3"

permissions:
  contents: write

concurrency:
  group: cold-email
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r v0/requirements.txt

      - name: Send batch
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DAILY_CAP: ${{ inputs.daily_cap || '3' }}
        run: |
          python scripts/cold_email_batch.py | tee batch-output.json

      - name: Commit + push (with rebase retry against concurrent pushes)
        run: |
          git config user.name "Crew OS Bot"
          git config user.email "bot@crewos.co.uk"
          git add outbound 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit (no eligible targets or empty list)."
            exit 0
          fi
          git commit -m "cold-email-batch: $(date -u +%FT%TZ)"
          for i in 1 2 3 4 5; do
            if git push 2>&1; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push rejected on attempt $i — fetching and rebasing"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep $((i * 3))
          done
          echo "Push failed after 5 attempts" >&2
          exit 1
