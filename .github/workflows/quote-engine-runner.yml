name: Quote-engine runner (process intake-queue)

on:
  push:
    paths:
      - "intake-queue/*.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quote-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r v0/requirements.txt

      - name: Run quote engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python scripts/quote_engine_runner.py | tee runner-output.json

      - name: Commit processed/failed artefacts
        run: |
          git config user.name "Crew OS Bot"
          git config user.email "bot@crewos.co.uk"
          git add intake-queue 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "quote-engine: process $(date -u +%FT%TZ)"
            git push
          else
            echo "Nothing to commit."
          fi
