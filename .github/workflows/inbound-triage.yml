name: Inbound triage (Gmail poll + classify + route)

on:
  schedule:
    # Every 2 hours during UK working day. Cron is UTC.
    - cron: "0 7,9,11,13,15,17,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: inbound-triage
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r v0/requirements.txt

      - name: Run triage
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python scripts/inbound_triage.py | tee triage-output.json

      - name: Commit + push (with rebase retry against concurrent pushes)
        run: |
          git config user.name "Crew OS Bot"
          git config user.email "bot@crewos.co.uk"
          git add intake-queue outbound runs 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new files to commit."
            exit 0
          fi
          git commit -m "triage: $(date -u +%FT%TZ)"
          for i in 1 2 3 4 5; do
            if git push 2>&1; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push rejected on attempt $i — fetching and rebasing"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep $((i * 3))
          done
          echo "Push failed after 5 attempts" >&2
          exit 1
